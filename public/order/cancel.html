<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="robots" content="noindex"/>
  <title>Commande annulée — Chewie</title>
  <link rel="icon" href="/favicon.png"/>
  <style>
    :root { --cream:#FBF7F0; --ink:#1f2937; --soft:#6b7280; --gold:#C8962C; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
      background:var(--cream); color:var(--ink); font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    .card { max-width:480px; width:100%; background:#fff; border:1px solid #ece5d8; border-radius:24px;
      padding:48px 36px; text-align:center; box-shadow:0 24px 60px rgba(60,40,10,.10); }
    img.logo { width:64px; height:64px; border-radius:16px; margin:0 auto 20px; display:block; }
    h1 { font-family:Georgia,'Times New Roman',serif; font-size:28px; font-style:italic; margin:0 0 10px; }
    p { color:var(--soft); font-size:16px; line-height:1.6; margin:0 0 16px; }
    a.btn { display:inline-block; background:var(--gold); color:#fff; text-decoration:none;
      font-weight:600; padding:13px 26px; border-radius:14px; }
    .en { color:#9aa1ab; font-size:13px; margin-top:18px; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/assets/logo-new.png" alt="Chewie"/>
    <h1>Commande annulée</h1>
    <p>Aucun paiement n'a été effectué. Votre médaille vous attend quand vous voulez.</p>
    <a class="btn" href="/#shop">Revenir à la boutique</a>
    <p class="en">Payment cancelled — nothing was charged.</p>
  </div>
</body>
</html>
